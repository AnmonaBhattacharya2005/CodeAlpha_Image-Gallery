<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery with Lightbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Interactive Image Gallery</h1>

    <div class="filter-container">
        <button class="filter-btn active" data-filter="all">All Items</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="architecture">Architecture</button>
        <button class="filter-btn" data-filter="animals">Animals</button>
    </div>

    <div class="gallery-grid" id="gallery">
        <div class="gallery-item" data-category="nature">
            <img src="https://picsum.photos/id/10/800/600" alt="Mountain Lake">
        </div>
        <div class="gallery-item" data-category="architecture">
            <img src="https://picsum.photos/id/1011/800/600" alt="Classic Bay Window">
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="https://picsum.photos/id/1025/800/600" alt="Pug in a Blanket">
        </div>
        <div class="gallery-item" data-category="nature">
            <img src="https://picsum.photos/id/28/800/600" alt="Forest Pathway">
        </div>
        <div class="gallery-item" data-category="architecture">
            <img src="https://picsum.photos/id/1031/800/600" alt="Amusement Park Structural Lines">
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="https://picsum.photos/id/1062/800/600" alt="Running Dog">
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
            <img src="" alt="Enlarged view" id="lightboxImg">
            <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
